<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>AURA AI Chat</title>

    <style>
        body {
            background: #0b1220;
            color: white;
            font-family: Arial;
            display: flex;
            flex-direction: column;
            height: 100vh;
            margin: 0;
        }

        header {
            padding: 15px;
            background: #111827;
        }

        #chat {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
        }

        .message {
            margin-bottom: 15px;
            max-width: 75%;
            padding: 12px;
            border-radius: 10px;
        }

        .user {
            background: #2563eb;
            margin-left: auto;
        }

        .bot {
            background: #111827;
            border: 1px solid #1f2937;
        }

        #input-area {
            display: flex;
            padding: 10px;
            background: #111827;
        }

        input {
            flex: 1;
            padding: 10px;
            border-radius: 6px;
            border: none;
        }

        button {
            margin-top: 10px;
            padding: 10px 15px;
            background: #16a34a;
            border: none;
            border-radius: 6px;
            color: white;
            cursor: pointer;
        }

        #send-button {
            margin-top: 0;
            margin-left: 10px;
        }

        .section {
    margin-top: 15px;
    font-size: 14px;
    color: #9ca3af;
    line-height: 1.5;
}

        .card {
            background: #111827;
            padding: 15px;
            border-radius: 10px;
            margin-top: 15px;
            border: 1px solid #1f2937;
        }

        .examples {
            background: #0b1220;
            padding: 10px 20px;
            color: #9ca3af;
            font-size: 13px;
            border-top: 1px solid #1f2937;
        }

        ul {
            margin-top: 6px;
        }
    </style>
</head>

<body>

<header>
    <div style="font-size:22px; color:#4fd1c5; font-weight:bold;">
    🚀 AURA — Business Decision Assistant
</div>

<div style="color:#9ca3af; font-size:14px; margin-top:5px;">
    Get clear, actionable advice for your business decisions.

    <br><br>
    Try asking:
    <br>• How should I price my product?
    <br>• What is the safest way to start a business?
    <br>• How do I grow without losing money?
</div>
</header>

<div id="chat"></div>

</div>

<div id="input-area">
    <input id="message" placeholder="e.g. I want to start a business with low risk..." />
    <button id="send-button" onclick="sendMessage()">Send</button>
</div>

<script>
let sessionId = "session_" + Math.random().toString(36).substring(7);

function addMessage(text, type) {
    const chat = document.getElementById("chat");

    const msg = document.createElement("div");
    msg.className = "message " + type;
    msg.innerHTML = text;

    chat.appendChild(msg);
    chat.scrollTop = chat.scrollHeight;
}

function renderProfile(profile) {
    if (!profile) return "";

    return `
        <div class="card">
            <h3>🧠 AURA Profile</h3>

            <div class="section">
                Preferred Risk: <b>${profile.preferred_risk ?? "unknown"}</b>
            </div>

            <div class="section">
                Preferred Budget: <b>${profile.preferred_budget ?? "unknown"}</b>
            </div>

            <div class="section">
                Preferred Domain: <b>${profile.preferred_domain ?? "unknown"}</b>
            </div>

            <div class="section">
                Interactions: <b>${profile.interaction_count ?? 0}</b>
            </div>
        </div>
    `;
}

async function sendMessage() {
    const input = document.getElementById("message");
    const text = input.value.trim();

    if (!text) return;

    addMessage(text, "user");
    input.value = "";

    const responseBox = document.createElement("div");
    responseBox.className = "message bot";
    responseBox.innerHTML = "<b>🧠 AURA is thinking...</b><br>";
    document.getElementById("chat").appendChild(responseBox);

    try {
        const res = await fetch("https://aura-ai-core-oeae.onrender.com/chat", {
            method: "POST",
            headers: {"Content-Type": "application/json"},
            body: JSON.stringify({
                message: text,
                session_id: sessionId
            })
        });

        const data = await res.json();

        let responseHTML = "";

        if (data.type === "clarification") {
            responseHTML = `
                <b>🤔 Clarification</b><br>
                <div class="section">${data.response}</div>
            `;
        }

        else if (data.type === "conversation") {
            const r = data.response;
            const adv = r.advanced_details || {};
            const brief = r.decision_brief || {};

            responseHTML = `
                <b>${r.summary}</b>

                <div class="section">
                    ${r.detail}
                </div>

                <div class="section">
                    <b>What to do next:</b>
                    <ul>
                        ${(r.next_steps || []).map(s => `<li>${s}</li>`).join("")}
                    </ul>
                </div>

                <div class="section">
                    💡 ${r.caution}
                </div>

                <div class="card">
                    <b>🧠 Decision Insight</b><br><br>

                    <b>Recommended Move:</b><br>
                    ${brief.recommended_move || "N/A"}<br><br>

                    <b>Why this works:</b><br>
                    ${brief.why_this || "N/A"}<br><br>

                    <b>Main Risk:</b><br>
                    ${brief.main_risk || "N/A"}<br><br>

                    <b>What to Watch:</b><br>
                    ${brief.watch_metric || "N/A"}<br><br>

                    <b>Fallback Plan:</b><br>
                    ${brief.fallback_move || "N/A"}
                </div>

                <button onclick="this.nextElementSibling.style.display = this.nextElementSibling.style.display === 'none' ? 'block' : 'none'">
                    Show reasoning
                </button>

                <div class="section" style="display:none; margin-top:10px;">
                    <b>Strategy:</b> ${adv.strategy ?? "N/A"}<br>
                    <b>Risk:</b> ${adv.risk ?? "N/A"}<br>
                    <b>Business Intent:</b> ${adv.business_intent ?? "N/A"}<br>
                    <b>Score:</b> ${adv.final_score ?? "N/A"}<br>
                    <b>Decision Score:</b> ${adv.decision_score ?? "N/A"}<br>
                    <b>Trust Score:</b> ${adv.trust_score ?? "N/A"}<br>
                    <b>Failure Probability:</b> ${adv.failure_probability ?? "N/A"}%<br>
                </div>

                ${renderProfile(data.profile)}
            `;
        }

        else if (data.type === "healthcare") {
            const r = data.response;
            const symptoms = r.symptoms || [];
            const guidance = r.guidance || [];

            responseHTML = `
                <b>🩺 AURA Healthcare</b>

                <div class="section">
                    <b>Summary:</b><br>
                    ${r.summary}
                </div>

                <div class="section">
                    <b>Urgency:</b> ${r.urgency}
                </div>

                <div class="section">
                    <b>Detected Symptoms:</b>
                    <ul>
                        ${
                            symptoms.length
                            ? symptoms.map(s => `<li>${s.name} (${s.urgency})</li>`).join("")
                            : "<li>No specific symptom detected</li>"
                        }
                    </ul>
                </div>

                <div class="section">
                    <b>Guidance:</b>
                    <ul>
                        ${guidance.map(g => `<li>${g}</li>`).join("")}
                    </ul>
                </div>

                <div class="section">
                    ${r.disclaimer}
                </div>

                ${renderProfile(data.profile)}
            `;
        }

        else {
            responseHTML = "⚠️ Unexpected response from AURA.";
        }

        responseBox.innerHTML = responseHTML;
        document.getElementById("chat").scrollTop = document.getElementById("chat").scrollHeight;

    } catch (err) {
        responseBox.innerHTML = "❌ Error connecting to AURA backend.";
        console.error(err);
    }
}
</script>

</body>
</html>
