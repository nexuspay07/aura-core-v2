<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>AURA AI Chat</title>

    <style>
        body {
            background: #0b1220;
            color: white;
            font-family: Arial, sans-serif;
            display: flex;
            flex-direction: column;
            height: 100vh;
            margin: 0;
        }

        header {
            padding: 15px;
            background: #111827;
        }

        #chat {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
        }

        .message {
            margin-bottom: 15px;
            max-width: 75%;
            padding: 12px;
            border-radius: 10px;
        }

        .user {
            background: #2563eb;
            margin-left: auto;
        }

        .bot {
            background: #111827;
            border: 1px solid #1f2937;
        }

        #input-area {
            display: flex;
            padding: 10px;
            background: #111827;
        }

        input {
            flex: 1;
            padding: 10px;
            border-radius: 6px;
            border: none;
        }

        button {
            margin-top: 10px;
            padding: 10px 15px;
            background: #16a34a;
            border: none;
            border-radius: 6px;
            color: white;
            cursor: pointer;
        }

        #send-button {
            margin-top: 0;
            margin-left: 10px;
        }

        .section {
            margin-top: 15px;
            font-size: 14px;
            color: #9ca3af;
            line-height: 1.5;
        }

        .card {
            background: #111827;
            padding: 15px;
            border-radius: 10px;
            margin-top: 15px;
            border: 1px solid #1f2937;
        }

        .strategy-card {
            margin-bottom: 12px;
            padding: 12px;
            border: 1px solid #374151;
            border-radius: 8px;
            background: #0b1220;
        }

        .unlock-button {
            background: #f59e0b;
            padding: 10px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            color: #111827;
            margin-top: 15px;
        }

        .blue-button {
            padding: 10px 14px;
            border: none;
            border-radius: 6px;
            background: #2563eb;
            color: white;
            cursor: pointer;
            margin-top: 12px;
        }

        ul, ol {
            margin-top: 6px;
        }
    </style>
</head>

<body>

<header>
    <div style="font-size:22px; color:#4fd1c5; font-weight:bold;">
        🚀 AURA — Business Decision Assistant
    </div>

    <div style="color:#9ca3af; font-size:14px; margin-top:5px;">
        Get clear, actionable advice for your business decisions.

        <br><br>
        Try asking:
        <br>• How should I price my product?
        <br>• What is the safest way to start a business?
        <br>• How do I grow without losing money?
    </div>
</header>

<div id="chat"></div>

<div id="input-area">
    <input id="message" placeholder="e.g. I want to start a business with low risk..." />
    <button id="send-button" onclick="sendMessage()">Send</button>
</div>

<script>
let sessionId = "session_" + Math.random().toString(36).substring(7);
let pendingGoal = null;
let lastDecision = null;

function addMessage(text, type) {
    const chat = document.getElementById("chat");
    const msg = document.createElement("div");

    msg.className = "message " + type;
    msg.innerHTML = text;

    chat.appendChild(msg);
    chat.scrollTop = chat.scrollHeight;

    return msg;
}

function saveHistory(item) {
    const key = "aura_history";
    const existing = JSON.parse(localStorage.getItem(key) || "[]");

    existing.unshift(item);
    localStorage.setItem(key, JSON.stringify(existing.slice(0, 10)));
}

function renderHistory() {
    const h = JSON.parse(localStorage.getItem("aura_history") || "[]");

    if (!h.length) return "";

    return `
        <div class="card">
            <b>📌 Recent Decisions</b>
            <ul>
                ${h.map(x => `
                    <li>
                        ${x.move || "Decision saved"}
                        <span style="color:#6b7280;">
                            (${new Date(x.time).toLocaleDateString()})
                        </span>
                    </li>
                `).join("")}
            </ul>
        </div>
    `;
}

function getUsageCount() {
    const c = Number(localStorage.getItem("aura_usage") || "0") + 1;
    localStorage.setItem("aura_usage", c);
    return c;
}

function renderProfile(profile) {
    if (!profile) return "";

    return `
        <div class="card">
            <h3>🧠 AURA Profile</h3>

            <div class="section">
                Preferred Risk: <b>${profile.preferred_risk ?? "unknown"}</b>
            </div>

            <div class="section">
                Preferred Budget: <b>${profile.preferred_budget ?? "unknown"}</b>
            </div>

            <div class="section">
                Preferred Domain: <b>${profile.preferred_domain ?? "unknown"}</b>
            </div>

            <div class="section">
                Interactions: <b>${profile.interaction_count ?? 0}</b>
            </div>
        </div>
    `;
}

function renderStrategyComparison(brief) {
    const sc = brief.strategy_comparison;

    if (!sc || !sc.comparisons) return "";

    return `
        <div style="margin-top:20px;">
            <b style="font-size:16px;">📊 Strategy Comparison</b><br><br>

            ${
                sc.comparisons.map(s => {
                    let color = "#6b7280";

                    if (s.risk === "low") color = "#16a34a";
                    if (s.risk === "medium") color = "#f59e0b";
                    if (s.risk === "high") color = "#dc2626";

                    return `
                        <div class="strategy-card">
                            <div style="font-size:15px; font-weight:bold;">
                                ${s.strategy}
                            </div>

                            <div style="margin-top:6px;">
                                Risk:
                                <span style="color:${color}; font-weight:bold;">
                                    ${s.risk}
                                </span>
                            </div>

                            <div>Score: <b>${s.score}</b></div>

                            <div style="margin-top:6px; color:#9ca3af;">
                                ${s.reason}
                            </div>
                        </div>
                    `;
                }).join("")
            }

            <div style="
                margin-top:15px;
                padding:12px;
                border-radius:8px;
                background:#111827;
                border:1px solid #4fd1c5;
            ">
                🏆 <b>Best Strategy:</b>
                <span style="color:#4fd1c5;">
                    ${sc.best_strategy?.strategy || "N/A"}
                </span>
            </div>
        </div>
    `;
}

function renderProReport(report) {
    if (!report) return "";

    return `
        <div class="card" style="border:1px solid #4fd1c5;">
            <h2 style="color:#4fd1c5;">🔓 AURA Pro Decision Report</h2>

            <div style="
                margin-bottom:15px;
                padding:12px;
                border-radius:8px;
                background:#0b1220;
                border:1px solid #1f2937;
                color:#9ca3af;
            ">
                💰 Businesses pay consultants $50–$300 for this level of analysis.
                You just generated it instantly with AURA.
            </div>

            <div style="
                font-size:18px;
                font-weight:bold;
                margin:15px 0;
                padding:12px;
                border-radius:8px;
                background:#111827;
                border-left:4px solid #4fd1c5;
            ">
                🚀 ${report.summary || "N/A"}
            </div>

            <hr style="margin:15px 0; border-color:#1f2937;">

            <div class="section">
                <b>📊 Strategy Comparison</b>
                <ul>
                    ${(report.strategy_breakdown || []).map(s => `
                        <li style="margin-bottom:8px;">
                            <b>${s.strategy}</b><br>
                            ${s.why_it_works}<br>
                            <span style="color:#9ca3af;">Risk: ${s.risk}</span>
                        </li>
                    `).join("")}
                </ul>
            </div>

            <div class="section">
                <b>🔮 Outcome Simulation</b><br><br>

                <b style="color:#16a34a;">Best Case:</b><br>
                ${report.scenarios?.best_case || "N/A"}<br><br>

                <b style="color:#f59e0b;">Expected:</b><br>
                ${report.scenarios?.expected_case || "N/A"}<br><br>

                <b style="color:#dc2626;">Worst Case:</b><br>
                ${report.scenarios?.worst_case || "N/A"}
            </div>

            <div class="section">
                <b>📊 Confidence Level:</b><br>
                This recommendation is based on your budget, market conditions,
                and multi-strategy simulation.
            </div>

            <div class="section">
                <b>⚠️ Risk Breakdown</b><br>
                <b>Main Risk:</b> ${report.risk_analysis?.main_risk || "N/A"}<br><br>
                <b>How to reduce risk:</b><br>
                ${report.risk_analysis?.mitigation || "N/A"}
            </div>

            <div class="section">
                <b>🛠️ Execution Plan</b>
                <ol>
                    ${(report.execution_plan || []).map(step => `<li>${step}</li>`).join("")}
                </ol>
            </div>

            <div class="section" style="background:#0b1220; padding:10px; border-radius:8px;">
                <b>📅 30-Day Action Plan</b><br><br>

                <b>Week 1:</b> ${report["30_day_plan"]?.week_1 || "N/A"}<br>
                <b>Week 2:</b> ${report["30_day_plan"]?.week_2 || "N/A"}<br>
                <b>Week 3:</b> ${report["30_day_plan"]?.week_3 || "N/A"}<br>
                <b>Week 4:</b> ${report["30_day_plan"]?.week_4 || "N/A"}
            </div>

            <div class="section" style="margin-top:12px;">
                <b>🧪 After you try this:</b><br>
                Tell AURA what happened, for example “conversion was low,” and it will adjust your strategy.
            </div>

            <div style="
                margin-top:20px;
                padding:12px;
                border-radius:8px;
                background:#111827;
                border:1px solid #1f2937;
                color:#9ca3af;
                font-size:13px;
            ">
                💡 This report is generated using AURA’s multi-strategy analysis,
                prediction modeling, and risk evaluation system.
            </div>

            <div style="
                margin-top:15px;
                font-size:13px;
                color:#6b7280;
            ">
                ⚡ Early version pricing. This report may cost more as AURA evolves.
            </div>
        </div>
    `;
}

function renderDecisionResponse(r, profile) {
    const brief = r.decision_brief || {};
    const usage = getUsageCount();

    return `
        <div style="
            font-size:18px;
            font-weight:bold;
            margin-bottom:10px;
            color:#4fd1c5;
        ">
            👉 ${brief.recommended_move || "No clear move yet"}
        </div>

        <div style="margin-top:10px; color:#4fd1c5;">
            🔥 Session streak: ${usage} decisions analyzed
        </div>

        <b>${r.summary || ""}</b>

        <div class="section">
            ${r.detail || ""}
        </div>

        ${
            (r.next_steps || []).length
            ? `
                <div class="section">
                    <b>What to do next:</b>
                    <ul>
                        ${(r.next_steps || []).map(s => `<li>${s}</li>`).join("")}
                    </ul>
                </div>
            `
            : ""
        }

        ${
            r.caution
            ? `<div class="section">💡 ${r.caution}</div>`
            : ""
        }

        ${
            Object.keys(brief).length
            ? `
                <div class="card">
                    <b>🧠 Decision Insight</b><br><br>

                    <div style="font-size:18px; font-weight:bold; margin-bottom:10px;">
                        📈 ${brief.expected_impact || "N/A"}
                    </div>

                    <b>Trade-off:</b><br>
                    ${brief.tradeoff || "N/A"}<br><br>

                    <b>Timeframe:</b><br>
                    ${brief.timeframe || "N/A"}<br><br>

                    <b>Confidence:</b><br>
                    ${Math.round((brief.confidence || 0) * 100)}%<br><br>

                    <b>Recommended Move:</b><br>
                    ${brief.recommended_move || "N/A"}<br><br>

                    <b>Context:</b><br>
                    ${brief.context_note || "General estimate"}<br><br>

                    <b>Why this works:</b><br>
                    ${brief.why_this || "N/A"}<br><br>

                    <div style="
                        margin-top:12px;
                        padding:10px;
                        border-radius:8px;
                        background:#0b1220;
                        border:1px solid #1f2937;
                        color:#9ca3af;
                    ">
                        <b>🔍 Why you can trust this:</b><br>
                        AURA compared multiple strategies using your budget, market conditions,
                        risk level, and predicted outcomes to select the strongest option.
                    </div>

                    <br>

                    <b>Main Risk:</b><br>
                    ${brief.main_risk || "N/A"}<br><br>

                    <b>What to Watch:</b><br>
                    ${brief.watch_metric || "N/A"}<br><br>

                    <b>Fallback Plan:</b><br>
                    ${brief.fallback_move || "N/A"}<br><br>

                    ${renderStrategyComparison(brief)}

                    <button class="unlock-button" onclick="unlockReport()">
                        🔓 Unlock Full Analysis ($5)
                    </button>

                    <button class="blue-button" onclick="runNextAction()">
                        ▶️ Run Next Action
                    </button>
                </div>
            `
            : ""
        }

        ${renderProfile(profile)}
        ${renderHistory()}
    `;
}

async function unlockReport() {
    if (!lastDecision) {
        alert("Run a decision first before unlocking a report.");
        return;
    }

    localStorage.setItem("aura_last_decision", JSON.stringify(lastDecision));

    try {
        const res = await fetch("https://aura-ai-core-oeae.onrender.com/create-checkout-session", {
            method: "POST",
            headers: {"Content-Type": "application/json"}
        });

        const data = await res.json();

        if (data.checkout_url) {
            window.location.href = data.checkout_url;
        } else {
            alert("Could not start payment.");
        }

    } catch (err) {
        alert("Payment error.");
        console.error(err);
    }
}

async function generatePaidReportAfterSuccess() {
    const params = new URLSearchParams(window.location.search);

    if (params.get("payment") !== "success") return;

    const saved = localStorage.getItem("aura_last_decision");

    if (!saved) {
        addMessage("✅ Payment successful, but no saved decision was found. Please run AURA again.", "bot");
        return;
    }

    const decision = JSON.parse(saved);
    const loadingBox = addMessage("<b>🔓 Payment successful. Generating Pro Report...</b>", "bot");

    try {
        const res = await fetch("https://aura-ai-core-oeae.onrender.com/pro-report", {
            method: "POST",
            headers: {"Content-Type": "application/json"},
            body: JSON.stringify({
                goal: decision.goal,
                decision_brief: decision.decision_brief,
                strategy_comparison: decision.decision_brief?.strategy_comparison || {}
            })
        });

        const data = await res.json();

        loadingBox.innerHTML = renderProReport(data.report);

        localStorage.removeItem("aura_last_decision");
        window.history.replaceState({}, document.title, window.location.pathname);

    } catch (err) {
        loadingBox.innerHTML = "❌ Payment worked, but Pro Report generation failed.";
        console.error(err);
    }
}

function runNextAction() {
    if (!lastDecision) return;

    const next =
        lastDecision.decision_brief?.recommended_move ||
        "Refine strategy based on results";

    document.getElementById("message").value = next;
    sendMessage();
}

async function sendMessage() {
    const input = document.getElementById("message");
    const text = input.value.trim();

    if (!text) return;

    let messageToSend = text;

    if (pendingGoal) {
        messageToSend = pendingGoal + " " + text;
        pendingGoal = null;
    }

    addMessage(text, "user");
    input.value = "";

    const responseBox = addMessage("<b>🧠 AURA is thinking...</b><br>", "bot");

    try {
        const res = await fetch("https://aura-ai-core-oeae.onrender.com/chat", {
            method: "POST",
            headers: {"Content-Type": "application/json"},
            body: JSON.stringify({
                message: messageToSend,
                session_id: sessionId
            })
        });

        const data = await res.json();

        let responseHTML = "";

        if (data.type === "clarification") {
            responseHTML = `
                <b>🤔 Clarification</b><br>
                <div class="section">${data.response}</div>
            `;
        }

        else if (data.type === "healthcare") {
            const r = data.response;
            const symptoms = r.symptoms || [];
            const guidance = r.guidance || [];

            responseHTML = `
                <b>🩺 AURA Healthcare</b>

                <div class="section">
                    <b>Summary:</b><br>
                    ${r.summary}
                </div>

                <div class="section">
                    <b>Urgency:</b> ${r.urgency}
                </div>

                <div class="section">
                    <b>Detected Symptoms:</b>
                    <ul>
                        ${
                            symptoms.length
                            ? symptoms.map(s => `<li>${s.name} (${s.urgency})</li>`).join("")
                            : "<li>No specific symptom detected</li>"
                        }
                    </ul>
                </div>

                <div class="section">
                    <b>Guidance:</b>
                    <ul>
                        ${guidance.map(g => `<li>${g}</li>`).join("")}
                    </ul>
                </div>

                <div class="section">
                    ${r.disclaimer}
                </div>

                ${renderProfile(data.profile)}
            `;
        }

        else if (data.type === "conversation") {
            const r = data.response || {};

            if (!r.decision_brief || Object.keys(r.decision_brief).length === 0) {
                pendingGoal = text;

                let questions = (r.summary || "")
                    .replace("To give a more accurate answer, I need:", "")
                    .split("•")
                    .map(q => q.trim())
                    .filter(q => q.length > 0);

                responseHTML = `
                    <div class="card">
                        <b>🤔 I need a bit more info</b>

                        <div class="section">
                            To give you a precise decision, answer:
                            <ul>
                                ${questions.map(q => `<li>${q}</li>`).join("")}
                            </ul>
                        </div>

                        <div class="section" style="margin-top:10px;">
                            AURA will improve accuracy once this is provided.
                        </div>
                    </div>

                    ${renderProfile(data.profile)}
                `;
            } else {
                lastDecision = {
                    goal: messageToSend,
                    decision_brief: r.decision_brief
                };

                saveHistory({
                    goal: messageToSend,
                    move: r.decision_brief?.recommended_move,
                    time: new Date().toISOString()
                });

                responseHTML = renderDecisionResponse(r, data.profile);
            }
        }

        else if (data.summary) {
            responseHTML = `
                <b>${data.summary.replace(/\n/g, "<br>")}</b>
                ${
                    data.detail
                    ? `<div class="section">${data.detail}</div>`
                    : ""
                }
            `;
        }

        else {
            responseHTML = "⚠️ Unexpected response from AURA.";
        }

        responseBox.innerHTML = responseHTML;
        document.getElementById("chat").scrollTop = document.getElementById("chat").scrollHeight;

    } catch (err) {
        responseBox.innerHTML = "❌ Error connecting to AURA backend.";
        console.error(err);
    }
}

window.addEventListener("load", generatePaidReportAfterSuccess);
</script>

</body>
</html>
