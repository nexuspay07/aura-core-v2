<!DOCTYPE html>
<html>
<head>
    <head>
    <meta charset="UTF-8">
    <title>AURA AI Chat</title>

    <style>
        body {
            background: #0b1220;
            color: white;
            font-family: Arial;
            display: flex;
            flex-direction: column;
            height: 100vh;
            margin: 0;
        }

        .card {
    background: #111827;
    padding: 15px;
    border-radius: 10px;
    margin-top: 20px;
}

        header {
            padding: 15px;
            background: #111827;
            color: #4fd1c5;
            font-size: 20px;
            font-weight: bold;
        }

        #chat {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
        }

        .message {
            margin-bottom: 15px;
            max-width: 70%;
            padding: 12px;
            border-radius: 10px;
        }

        .user {
            background: #2563eb;
            align-self: flex-end;
        }

        .bot {
            background: #111827;
            border: 1px solid #1f2937;
        }

        #input-area {
            display: flex;
            padding: 10px;
            background: #111827;
        }

        input {
            flex: 1;
            padding: 10px;
            border-radius: 6px;
            border: none;
        }

        button {
            margin-left: 10px;
            padding: 10px 15px;
            background: #16a34a;
            border: none;
            border-radius: 6px;
            color: white;
            cursor: pointer;
        }

        .section {
            margin-top: 10px;
            font-size: 14px;
            color: #9ca3af;
        }
    </style>
</head>

<body>

<header style="padding:15px; background:#111827;">
    <div style="font-size:22px; color:#4fd1c5; font-weight:bold;">
        🚀 AURA — AI Decision Assistant
    </div>
    <div style="color:#9ca3af; font-size:14px; margin-top:5px;">
        Tell AURA your goal, and it will guide your next move.
    </div>
</header>

<div id="chat"></div>

<div id="input-area">
    <input id="message" placeholder="e.g. I want to start a business with low risk..." />
    <button onclick="sendMessage()">Send</button>
</div>

<div style="margin-top:10px; color:#9ca3af; font-size:13px;">
    Try:
    <ul style="margin:5px 0 0 15px;">
        <li>Start a business with low risk</li>
        <li>Grow faster without losing money</li>
        <li>How should I price my product?</li>
    </ul>
</div>

<script>
let sessionId = "session_" + Math.random().toString(36).substring(7);

function addMessage(text, type) {
    const chat = document.getElementById("chat");

    const msg = document.createElement("div");
    msg.className = "message " + type;
    msg.innerHTML = text;

    chat.appendChild(msg);
    chat.scrollTop = chat.scrollHeight;
}

async function sendMessage() {
    const input = document.getElementById("message");
    const text = input.value.trim();

    if (!text) return;

    addMessage(text, "user");
    input.value = "";

    const responseBox = document.createElement("div");
    responseBox.className = "message bot";
    responseBox.innerHTML = "<b>🧠 AURA is thinking...</b><br>";
    document.getElementById("chat").appendChild(responseBox);

    try {
        const res = await fetch("https://aura-ai-core-oeae.onrender.com/chat", {
            method: "POST",
            headers: {"Content-Type": "application/json"},
            body: JSON.stringify({
                message: text,
                session_id: sessionId
            })
        });

        const data = await res.json();

        let responseHTML = "";

        if (data.type === "clarification") {
            responseHTML = `<b>🤔 Clarification:</b><br>${data.response}`;
        }

        else if (data.type === "conversation") {
    const r = data.response;
    const adv = r.advanced_details || {};

    responseHTML = `
        <b>${r.summary}</b>

        <div class="section">
            ${r.detail}
        </div>

        <div class="section">
            <b>What to do next:</b>
            <ul>
                ${(r.next_steps || []).map(s => `<li>${s}</li>`).join("")}
            </ul>
        </div>

        <div class="section">
            💡 ${r.caution}
        </div>

        <button onclick="this.nextElementSibling.style.display = this.nextElementSibling.style.display === 'none' ? 'block' : 'none'">
            Show reasoning
        </button>

        <div class="section" style="display:none; margin-top:10px;">
            <b>Strategy:</b> ${adv.strategy}<br>
            <b>Risk:</b> ${adv.risk}<br>
            <b>Score:</b> ${adv.final_score}<br>
            <b>Decision Score:</b> ${adv.decision_score}<br>
            <b>Trust Score:</b> ${adv.trust_score}<br>
            <b>Failure Probability:</b> ${adv.failure_probability}%<br>
        </div>
    `;
}

        if (data.profile) {
    const p = data.profile;

    const profileHTML = `
        <div class="card" style="margin-top:15px;">
            <h3>🧠 AURA Profile</h3>

            <div class="section">
                Preferred Risk: <b>${p.preferred_risk ?? "unknown"}</b>
            </div>

            <div class="section">
                Preferred Budget: <b>${p.preferred_budget ?? "unknown"}</b>
            </div>

            <div class="section">
                Preferred Domain: <b>${p.preferred_domain ?? "unknown"}</b>
            </div>

            <div class="section">
                Interactions: <b>${p.interaction_count ?? 0}</b>
            </div>
        </div>
    `;

    responseBox.innerHTML += profileHTML;;
}

        else if (data.type === "healthcare") {
            const r = data.response;
            const symptoms = r.symptoms || [];
            const guidance = r.guidance || [];

            responseHTML = `
                <b>🩺 AURA Healthcare</b>

                <div class="section">
                    <b>Summary:</b><br>
                    ${r.summary}
                </div>

                <div class="section">
                    <b>Urgency:</b> ${r.urgency}
                </div>

                <div class="section">
                    <b>Detected Symptoms:</b>
                    <ul>
                        ${symptoms.length
                            ? symptoms.map(s => `<li>${s.name} (${s.urgency})</li>`).join("")
                            : "<li>No specific symptom detected</li>"}
                    </ul>
                </div>

                <div class="section">
                    <b>Guidance:</b>
                    <ul>
                        ${guidance.map(g => `<li>${g}</li>`).join("")}
                    </ul>
                </div>

                <div class="section">
                    ${r.disclaimer}
                </div>
            `;
        }

        else {
            responseHTML = "⚠️ Unexpected response from AURA.";
        }

        responseBox.innerHTML = responseHTML;

    } catch (err) {
        responseBox.innerHTML = "❌ Error connecting to AURA backend.";
        console.error(err);
    }
}
</script>

</body>
</html>
